name: Build and Deploy to k3s

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K3S_SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.K3S_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to k3s server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.K3S_SERVER_SSH_USERNAME }}@${{ secrets.K3S_SERVER_HOST }} << 'EOF'
          set -e
          
          echo "Deploying DSS to k3s..."
          
          # Navigate to project directory (create if not exists)
          PROJECT_DIR="/home/${{ secrets.K3S_SERVER_SSH_USERNAME }}/DSS"
          mkdir -p $PROJECT_DIR
          cd $PROJECT_DIR
          
          # Clone or pull latest code
          if [ -d ".git" ]; then
            echo "Updating existing repository..."
            git pull origin ${{ github.ref_name }}
          else
            echo "Cloning repository..."
            git clone --branch ${{ github.ref_name }} ${{ github.server_url }}/${{ github.repository }}.git .
          fi
          
          # Build backend Docker image
          echo "Building backend Docker image..."
          docker build -f Dockerfile -t dss-api:latest .
          
          # Build frontend Docker image
          echo "Building frontend Docker image..."
          docker build -f webui/Dockerfile -t dss-ui:latest ./webui
          
          # Load the images into containerd (k3s uses containerd, not Docker)
          echo "Loading images into containerd..."
          docker save dss-api:latest | sudo ctr -n k8s.io images import -
          docker save dss-ui:latest | sudo ctr -n k8s.io images import -
          
          # Create namespace first if it doesn't exist
          kubectl apply -f k8s/namespace.yaml
          
          # Set KUBECONFIG to point to k3s config
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          
          # Upsert k8s Secret for API env vars from GitHub secrets
          kubectl create secret generic dss-api-secret \
            --from-literal=DSS_SECRET_KEY="${{ secrets.DSS_SECRET_KEY }}" \
            --from-literal=DSS_DB_PATH="${{ secrets.DSS_DB_PATH }}" \
            -n dss \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # Deploy Authelia using Helm
          echo "Deploying Authelia authentication server..."
          helm repo add authelia https://charts.authelia.com 2>/dev/null || true
          helm repo update >/dev/null 2>&1 || true
          
          helm upgrade --install authelia k8s/authelia-chart/ \
            -n dss \
            --set authelia.jwtSecret="${{ secrets.AUTHELIA_JWT_SECRET }}" \
            --set authelia.sessionDomain="${{ secrets.AUTHELIA_SESSION_DOMAIN }}" \
            --set authelia.adminPassword="${{ secrets.AUTHELIA_ADMIN_PASSWORD }}" \
            --set authelia.adminUsername="${{ secrets.AUTHELIA_ADMIN_USERNAME }}" \
            --set persistence.enabled=true \
            --set persistence.size=2Gi \
            --timeout=10m
          
          # Wait for authelia to be ready
          echo "Waiting for Authelia to be ready..."
          kubectl rollout status deployment/authelia -n dss --timeout=10m || true
          
          # Deploy using kubectl
          echo "Deploying backend to k3s cluster..."
          kubectl apply -f k8s/deployment-api.yaml
          kubectl apply -f k8s/ingress.yaml
          
          echo "Deploying frontend to k3s cluster..."
          kubectl apply -f k8s/deployment-ui.yaml
          
          echo "Deployment complete!"
          
          # Wait for deployments to be ready
          echo "Waiting for deployments to be ready..."
          kubectl rollout status deployment/dss-api -n dss --timeout=5m || true
          kubectl rollout status deployment/dss-ui -n dss --timeout=5m || true
          
          # Show running services
          echo "Services status:"
          kubectl get pods -n dss
          kubectl get svc -n dss
          
          # Cleanup dangling Docker images
          echo "Cleaning up dangling Docker images..."
          docker image prune -f --filter "until=1h" || true

          # Force restart of services to ensure new images are used (skip authelia as it will restart on config change)
          kubectl delete pod -n dss -l app=dss-ui 2>/dev/null || true
          kubectl delete pod -n dss -l app=dss-api 2>/dev/null || true
          sleep 3

          EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.K3S_SERVER_SSH_USERNAME }}@${{ secrets.K3S_SERVER_HOST }} << 'EOF'
          echo "Verifying deployment..."
          
          PROJECT_DIR="/home/${{ secrets.K3S_SERVER_SSH_USERNAME }}/DSS"
          cd $PROJECT_DIR
          echo "=== Services Status ==="
          kubectl get pods -n dss
          kubectl get svc -n dss
          
          # Verify API is responding
          echo "=== API Health Check ==="
          kubectl port-forward -n dss svc/dss-api-service 8000:8000 > /dev/null 2>&1 &
          API_PF_PID=$!
          sleep 2
          
          # Check API health with timeout
          if curl -s --max-time 5 http://localhost:8000/docs > /tmp/docs_response.html 2>/dev/null; then
            echo "✓ API is responding"
            echo "Response preview:"
            head -10 /tmp/docs_response.html
          else
            echo "✗ API health check failed"
          fi
          
          # Kill port-forward process
          kill $API_PF_PID 2>/dev/null || true
          wait $API_PF_PID 2>/dev/null || true
          
          # Verify UI is responding
          echo "=== UI Health Check ==="
          kubectl port-forward -n dss svc/dss-ui-service 3010:3010 > /dev/null 2>&1 &
          UI_PF_PID=$!
          sleep 2
          
          # Check UI health with timeout
          if curl -s --max-time 5 http://localhost:3010 > /tmp/ui_response.html 2>/dev/null; then
            echo "✓ UI is responding"
            echo "Response preview:"
            head -5 /tmp/ui_response.html
          else
            echo "✗ UI health check failed"
          fi
          
          # Kill port-forward process
          kill $UI_PF_PID 2>/dev/null || true
          wait $UI_PF_PID 2>/dev/null || true
          
          # Verify Authelia is responding
          echo "=== Authelia Health Check ==="
          
          # Wait for authelia pods to be ready
          echo "Waiting for Authelia pods to be ready..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=authelia -n dss --timeout=10m 2>/dev/null || true
          
          kubectl port-forward -n dss svc/authelia-service 9091:9091 > /dev/null 2>&1 &
          AUTH_PF_PID=$!
          sleep 3
          
          # Check Authelia health with timeout
          if curl -s --max-time 10 http://localhost:9091/api/health > /tmp/authelia_response.json 2>/dev/null; then
            echo "✓ Authelia is responding"
            echo "Response:"
            cat /tmp/authelia_response.json
          else
            echo "✗ Authelia health check failed"
          fi
          
          # Kill port-forward process
          kill $AUTH_PF_PID 2>/dev/null || true
          wait $AUTH_PF_PID 2>/dev/null || true
          wait $PF_PID 2>/dev/null || true
          
          echo "Deployment verification complete!"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          # Cleanup dangling images from local runner
          docker image prune -f || true
