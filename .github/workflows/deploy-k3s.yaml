name: Build and Deploy to k3s

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K3S_SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.K3S_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build backend Docker image
        run: docker build -f Dockerfile -t dss-api:latest .

      - name: Build frontend Docker image
        run: docker build -f webui/Dockerfile -t dss-ui:latest ./webui

      - name: Save images to tar files
        run: |
          docker save dss-api:latest > dss-api.tar
          docker save dss-ui:latest > dss-ui.tar

      - name: Transfer files to VPS
        run: |
          if [ "${{ secrets.K3S_SERVER_SSH_USERNAME }}" = "root" ]; then
            PROJECT_DIR="/root/DSS"
          else
            PROJECT_DIR="/home/${{ secrets.K3S_SERVER_SSH_USERNAME }}/DSS"
          fi
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.K3S_SERVER_SSH_USERNAME }}@${{ secrets.K3S_SERVER_HOST }} "mkdir -p $PROJECT_DIR"
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no dss-api.tar dss-ui.tar ${{ secrets.K3S_SERVER_SSH_USERNAME }}@${{ secrets.K3S_SERVER_HOST }}:$PROJECT_DIR/
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -r k8s/ ${{ secrets.K3S_SERVER_SSH_USERNAME }}@${{ secrets.K3S_SERVER_HOST }}:$PROJECT_DIR/

      - name: Deploy to k3s server
        run: |
          if [ "${{ secrets.K3S_SERVER_SSH_USERNAME }}" = "root" ]; then
            PROJECT_DIR="/root/DSS"
          else
            PROJECT_DIR="/home/${{ secrets.K3S_SERVER_SSH_USERNAME }}/DSS"
          fi
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.K3S_SERVER_SSH_USERNAME }}@${{ secrets.K3S_SERVER_HOST }} << EOF
          set -e

          echo "Deploying DSS to k3s..."
          cd $PROJECT_DIR

          echo "Loading backend image..."
          docker load < dss-api.tar

          echo "Loading frontend image..."
          docker load < dss-ui.tar

          echo "Loading images into containerd..."
          docker save dss-api:latest | sudo ctr -n k8s.io images import -
          docker save dss-ui:latest | sudo ctr -n k8s.io images import -

          # kubectl delete namespace dss --ignore-not-found --wait=true
          kubectl apply -f k8s/namespace.yaml

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          kubectl create secret generic dss-api-secret \
            --from-literal=DSS_SECRET_KEY="${{ secrets.DSS_SECRET_KEY }}" \
            --from-literal=DSS_ROOT_USER="${{ secrets.DSS_ROOT_USER }}" \
            --from-literal=DSS_ROOT_PASSWORD="${{ secrets.DSS_ROOT_PASSWORD }}" \
            -n dss \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic dss-mongo-secret \
            --from-literal=DSS_MONGO_USER="${{ secrets.DSS_MONGO_USER }}" \
            --from-literal=DSS_MONGO_PASS="${{ secrets.DSS_MONGO_PASS }}" \
            -n dss \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Deploying MongoDB to k3s cluster..."
          kubectl apply -f k8s/mongodb.yaml
          kubectl rollout status deployment/mongodb -n dss --timeout=5m

          echo "Deploying backend to k3s cluster..."
          kubectl apply -f k8s/deployment-api.yaml
          kubectl apply -f k8s/ingress.yaml

          echo "Deploying frontend to k3s cluster..."
          kubectl apply -f k8s/deployment-ui.yaml

          echo "Deployment complete!"

          kubectl rollout status deployment/dss-api -n dss --timeout=5m || true
          kubectl rollout status deployment/dss-ui -n dss --timeout=5m || true
          kubectl rollout status deployment/mongodb -n dss --timeout=5m || true

          echo "Services status:"
          kubectl get pods -n dss
          kubectl get svc -n dss

          docker image prune -f --filter "until=1h" || true

          kubectl delete pod -n dss -l app=dss-ui 2>/dev/null || true
          kubectl delete pod -n dss -l app=dss-api 2>/dev/null || true
          kubectl delete pod -n dss -l app=mongodb 2>/dev/null || true

          kubectl rollout status deployment/dss-api -n dss --timeout=5m
          kubectl rollout status deployment/dss-ui -n dss --timeout=5m
          kubectl rollout status deployment/mongodb -n dss --timeout=5m
          sleep 3

          rm -f dss-api.tar dss-ui.tar
          EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.K3S_SERVER_SSH_USERNAME }}@${{ secrets.K3S_SERVER_HOST }} << 'EOF'
          echo "Verifying deployment..."

          echo "=== Services Status ==="
          kubectl get pods -n dss
          kubectl get svc -n dss

          echo "=== API Health Check ==="
          kubectl port-forward -n dss svc/dss-api-service 8000:8000 > /dev/null 2>&1 &
          API_PF_PID=$!
          sleep 2

          if curl -s --max-time 5 http://localhost:8000/docs > /tmp/docs_response.html 2>/dev/null; then
            echo "✓ API is responding"
            echo "Response preview:"
            head -10 /tmp/docs_response.html
          else
            echo "✗ API health check failed"
          fi

          kill $API_PF_PID 2>/dev/null || true
          wait $API_PF_PID 2>/dev/null || true

          echo "=== UI Health Check ==="
          kubectl port-forward -n dss svc/dss-ui-service 3010:4173 > /dev/null 2>&1 &
          UI_PF_PID=$!
          sleep 2

          if curl -s --max-time 5 http://localhost:3010 > /tmp/ui_response.html 2>/dev/null; then
            echo "✓ UI is responding"
            echo "Response preview:"
            head -5 /tmp/ui_response.html
          else
            echo "✗ UI health check failed"
          fi

          kill $UI_PF_PID 2>/dev/null || true
          wait $UI_PF_PID 2>/dev/null || true

          echo "Deployment verification complete!"
          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa dss-api.tar dss-ui.tar
          docker image prune -f || true
