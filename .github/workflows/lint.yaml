name: Lint Code

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install testing dependencies
        run: pip install -r requirements-test.txt

      - name: Lint Python code with pylint
        run: pylint src/ --fail-under=7.0 --exit-zero
        continue-on-error: true

  lint-javascript:
    name: Lint JavaScript/TypeScript Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: webui
        run: pnpm install

      - name: Lint JavaScript/TypeScript code with ESLint
        working-directory: webui
        run: pnpm lint
        continue-on-error: true

      - name: Check for lint errors (strict mode)
        working-directory: webui
        run: eslint . --ext .ts,.tsx --format json > eslint-report.json || echo "Linting completed with issues"

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ESLint Report
          path: webui/eslint-report.json
          retention-days: 30
