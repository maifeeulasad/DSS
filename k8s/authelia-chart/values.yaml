replicaCount: 1

image:
  repository: authelia/authelia
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9091
  targetPort: 9091

persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path
  mountPath: /config

# ALL VALUES LOADED FROM GITHUB SECRETS
authelia:
  jwtSecret: ""  # Set via --set authelia.jwtSecret in helm
  sessionDomain: ""  # Set via --set authelia.sessionDomain in helm
  adminUsername: ""  # Set via --set authelia.adminUsername in helm
  adminPassword: ""  # Set via --set authelia.adminPassword in helm

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 128Mi

nodeSelector: {}
affinity: {}
tolerations: []
