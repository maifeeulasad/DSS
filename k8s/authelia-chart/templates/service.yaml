apiVersion: v1
kind: Service
metadata:
  name: {{ include "authelia.fullname" . }}-service
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "authelia.selectorLabels" . | nindent 4 }}
