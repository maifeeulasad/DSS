apiVersion: apps/v1
kind: Deployment
metadata:
  name: dss-ui
  namespace: dss
  labels:
    app: dss-ui
    version: v1

spec:
  replicas: 1
  selector:
    matchLabels:
      app: dss-ui

  template:
    metadata:
      labels:
        app: dss-ui

    spec:
      containers:
      - name: ui
        image: dss-ui:latest
        imagePullPolicy: Never  # Use local images (for k3s setup)
        ports:
        - containerPort: 3010
          name: http
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        
        livenessProbe:
          httpGet:
            path: /
            port: 4173
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: 4173
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: dss-ui-service
  namespace: dss
  labels:
    app: dss-ui

spec:
  type: NodePort
  selector:
    app: dss-ui
  ports:
  - name: http
    port: 3010
    targetPort: 3010
    nodePort: 30001
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: dss-ui-internal
  namespace: dss
  labels:
    app: dss-ui

spec:
  type: ClusterIP
  selector:
    app: dss-ui
  ports:
  - name: http
    port: 3010
    targetPort: 3010
    protocol: TCP
