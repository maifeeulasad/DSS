apiVersion: apps/v1
kind: Deployment
metadata:
  name: dss-api
  namespace: dss
  labels:
    app: dss-api
    version: v1

spec:
  replicas: 1
  selector:
    matchLabels:
      app: dss-api

  template:
    metadata:
      labels:
        app: dss-api

    spec:
      containers:
      - name: api
        image: dss-api:latest
        imagePullPolicy: Never  # Use local images (for k3s setup)
        ports:
        - containerPort: 8000
          name: http
        
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: dss-api-service
  namespace: dss
  labels:
    app: dss-api

spec:
  type: ClusterIP
  selector:
    app: dss-api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
